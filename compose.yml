services:
  postgres:
    image: postgres:17-alpine 
    container_name: finance_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: fin_pass
      POSTGRES_DB: finance_db
    ports:
      - "5433:5432"
    volumes:
      - finance_data:/var/lib/postgresql/data
    networks:
      - finance_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    
networks:
  finance_network:
    
volumes:
  finance_data:
    